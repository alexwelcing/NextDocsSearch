<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pipeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080812" />
      <stop offset="100%" stop-color="#040408" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#pipeBg)" />
  <text x="40" y="35" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">MDX ARTICLE PUBLISHING PIPELINE</text>
  <!-- Pipeline flow -->
  <!-- Step 1: MDX File -->
  <rect x="40" y="70" width="160" height="130" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="55" y="95" font-family="monospace" font-size="10" fill="hsl(190, 70%, 55%)" letter-spacing="1">MDX FILE</text>
  <text x="55" y="115" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">---</text>
  <text x="55" y="128" font-family="monospace" font-size="7" fill="hsl(45, 60%, 50%)">title:</text>
  <text x="95" y="128" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.35)">'My Article'</text>
  <text x="55" y="141" font-family="monospace" font-size="7" fill="hsl(45, 60%, 50%)">date:</text>
  <text x="90" y="141" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.35)">'2026-03-03'</text>
  <text x="55" y="154" font-family="monospace" font-size="7" fill="hsl(45, 60%, 50%)">keywords:</text>
  <text x="55" y="167" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.35)">  - AI, Next.js</text>
  <text x="55" y="180" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">---</text>
  <text x="55" y="193" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.25)"># Content here...</text>
  <!-- Arrow 1 -->
  <g transform="translate(210, 125)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="hsl(190, 50%, 40%)" stroke-width="1.5" />
    <polygon points="40,-4 48,0 40,4" fill="hsl(190, 50%, 40%)" />
  </g>
  <!-- Step 2: Build Scripts -->
  <rect x="260" y="70" width="200" height="130" rx="6" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.15)" stroke-width="1" />
  <text x="275" y="95" font-family="monospace" font-size="10" fill="hsl(190, 70%, 55%)" letter-spacing="1">BUILD SCRIPTS</text>
  <rect x="275" y="105" width="170" height="18" rx="2" fill="rgba(255,255,255,0.03)" />
  <text x="280" y="118" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.4)">generate-article-manifest</text>
  <rect x="275" y="128" width="170" height="18" rx="2" fill="rgba(255,255,255,0.03)" />
  <text x="280" y="141" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.4)">generate-image-manifest</text>
  <rect x="275" y="151" width="170" height="18" rx="2" fill="rgba(255,255,255,0.03)" />
  <text x="280" y="164" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.4)">generate-recommendation-index</text>
  <rect x="275" y="174" width="170" height="18" rx="2" fill="rgba(255,255,255,0.03)" />
  <text x="280" y="187" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.4)">generate-embeddings</text>
  <!-- Arrow 2 -->
  <g transform="translate(470, 125)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="hsl(190, 50%, 40%)" stroke-width="1.5" />
    <polygon points="40,-4 48,0 40,4" fill="hsl(190, 50%, 40%)" />
  </g>
  <!-- Step 3: Generated Data -->
  <rect x="520" y="70" width="240" height="130" rx="6" fill="rgba(255,215,0,0.04)" stroke="rgba(255,215,0,0.15)" stroke-width="1" />
  <text x="535" y="95" font-family="monospace" font-size="10" fill="hsl(45, 70%, 55%)" letter-spacing="1">GENERATED DATA</text>
  <text x="535" y="118" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.35)">lib/generated/</text>
  <text x="545" y="138" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">article-manifest.json</text>
  <text x="545" y="155" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">image-manifest.json</text>
  <text x="545" y="172" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">recommendation-index.json</text>
  <text x="545" y="189" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">embeddings.json</text>
  <!-- Git workflow section -->
  <rect x="40" y="240" width="720" height="170" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="55" y="265" font-family="monospace" font-size="10" fill="hsl(190, 60%, 55%)" letter-spacing="1">GIT-NATIVE WORKFLOW</text>
  <!-- Git flow steps -->
  <g transform="translate(70, 290)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="0.5" />
    <text x="15" y="17" font-family="monospace" font-size="8" fill="hsl(190, 60%, 55%)">Write MDX</text>
    <text x="15" y="30" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">pages/docs/articles/</text>
  </g>
  <text x="200" y="315" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.2)">-&gt;</text>
  <g transform="translate(225, 290)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="0.5" />
    <text x="15" y="17" font-family="monospace" font-size="8" fill="hsl(190, 60%, 55%)">git commit</text>
    <text x="15" y="30" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">version controlled</text>
  </g>
  <text x="355" y="315" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.2)">-&gt;</text>
  <g transform="translate(380, 290)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="0.5" />
    <text x="15" y="17" font-family="monospace" font-size="8" fill="hsl(190, 60%, 55%)">pnpm build</text>
    <text x="15" y="30" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">runs pipeline</text>
  </g>
  <text x="510" y="315" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.2)">-&gt;</text>
  <g transform="translate(535, 290)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.2)" stroke-width="0.5" />
    <text x="15" y="17" font-family="monospace" font-size="8" fill="hsl(45, 70%, 55%)">Deploy</text>
    <text x="15" y="30" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">Vercel / Next.js</text>
  </g>
  <text x="70" y="365" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">Articles live in source control alongside code. No CMS required.</text>
</svg>