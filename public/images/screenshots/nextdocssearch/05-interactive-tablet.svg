<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tabletBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510" />
      <stop offset="100%" stop-color="#0a0a1a" />
    </linearGradient>
    <filter id="tabletGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#tabletBg)" />
  <!-- 3D tablet floating in space -->
  <g transform="translate(100, 60)">
    <!-- Tablet body with perspective -->
    <polygon points="60,20 300,0 320,280 80,310" fill="#0d0d1a" stroke="hsl(190, 60%, 40%)" stroke-width="2" />
    <!-- Screen area -->
    <polygon points="75,35 290,17 305,265 90,290" fill="#080812" stroke="rgba(0,212,255,0.2)" stroke-width="1" />
    <!-- Screen content lines -->
    <line x1="95" y1="55" x2="200" y2="48" stroke="hsl(190, 60%, 50%)" stroke-width="1.5" opacity="0.6" />
    <line x1="95" y1="75" x2="260" y2="65" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <line x1="95" y1="90" x2="240" y2="82" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <line x1="95" y1="105" x2="250" y2="97" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <!-- Menu items on tablet -->
    <rect x="95" y="125" width="180" height="25" rx="2" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="0.5" />
    <text x="105" y="142" font-family="monospace" font-size="9" fill="hsl(190, 60%, 55%)">AI Chat</text>
    <rect x="98" y="160" width="175" height="25" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" />
    <text x="108" y="177" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Articles</text>
    <rect x="100" y="195" width="170" height="25" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" />
    <text x="110" y="212" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Quizzes</text>
    <rect x="102" y="230" width="165" height="25" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" />
    <text x="112" y="247" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Leaderboard</text>
    <!-- Glow effect -->
    <ellipse cx="190" cy="150" rx="140" ry="100" fill="rgba(0,212,255,0.03)" />
  </g>
  <!-- Arrow indicating transition -->
  <g transform="translate(380, 180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="hsl(190, 60%, 50%)" stroke-width="2" stroke-dasharray="6,3" />
    <polygon points="60,-5 70,0 60,5" fill="hsl(190, 60%, 50%)" />
  </g>
  <!-- 2D Terminal overlay -->
  <g transform="translate(450, 30)">
    <rect x="0" y="0" width="320" height="380" rx="8" fill="#0c0c18" stroke="hsl(190, 50%, 35%)" stroke-width="1.5" />
    <!-- Terminal header -->
    <rect x="0" y="0" width="320" height="30" rx="8" fill="#151522" />
    <rect x="0" y="15" width="320" height="15" fill="#151522" />
    <circle cx="18" cy="15" r="4" fill="#ff5f57" opacity="0.7" />
    <circle cx="32" cy="15" r="4" fill="#febc2e" opacity="0.7" />
    <circle cx="46" cy="15" r="4" fill="#28c840" opacity="0.7" />
    <text x="120" y="19" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Terminal Overlay</text>
    <!-- Terminal content -->
    <text x="15" y="55" font-family="monospace" font-size="10" fill="hsl(190, 70%, 55%)">$ ask "What articles about AI?"</text>
    <text x="15" y="75" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)">Searching embeddings...</text>
    <text x="15" y="100" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Found 3 matching articles:</text>
    <text x="15" y="120" font-family="monospace" font-size="9" fill="hsl(120, 50%, 50%)">1. AI Product Strategy</text>
    <text x="15" y="138" font-family="monospace" font-size="9" fill="hsl(120, 50%, 50%)">2. Trust Calibration</text>
    <text x="15" y="156" font-family="monospace" font-size="9" fill="hsl(120, 50%, 50%)">3. Safe LLM Launch</text>
    <!-- Blinking cursor -->
    <rect x="15" y="180" width="8" height="14" fill="hsl(190, 80%, 50%)" opacity="0.8" />
    <!-- Quiz section -->
    <line x1="15" y1="220" x2="305" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="15" y="245" font-family="monospace" font-size="10" fill="hsl(45, 70%, 55%)">QUIZ MODE</text>
    <text x="15" y="265" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Q: What powers the search?</text>
    <rect x="15" y="278" width="250" height="22" rx="3" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="0.5" />
    <text x="25" y="293" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">A) Keywords  B) Embeddings  C) Tags</text>
    <!-- Leaderboard preview -->
    <line x1="15" y1="320" x2="305" y2="320" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="15" y="345" font-family="monospace" font-size="10" fill="hsl(45, 70%, 55%)">LEADERBOARD</text>
    <text x="15" y="362" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">1. player_42   2450pts</text>
  </g>
  <!-- Labels -->
  <text x="140" y="400" font-family="monospace" font-size="11" fill="hsl(190, 60%, 50%)" letter-spacing="1">3D DISCOVERY</text>
  <text x="530" y="430" font-family="monospace" font-size="11" fill="hsl(190, 60%, 50%)" letter-spacing="1">2D PRODUCTIVITY</text>
</svg>