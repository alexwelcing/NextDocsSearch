<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="supaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080814" />
      <stop offset="100%" stop-color="#040408" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#supaBg)" />
  <text x="40" y="35" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">SUPABASE FULL-STACK DATA LAYER</text>
  <!-- Central Supabase logo area -->
  <rect x="310" y="70" width="180" height="60" rx="8" fill="rgba(62,207,142,0.08)" stroke="rgba(62,207,142,0.3)" stroke-width="1.5" />
  <text x="345" y="105" font-family="system-ui, sans-serif" font-size="20" fill="hsl(155, 60%, 50%)" font-weight="700">Supabase</text>
  <!-- Four service boxes connected to center -->
  <!-- PostgreSQL -->
  <rect x="40" y="170" width="200" height="120" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(59,130,246,0.2)" stroke-width="1" />
  <text x="55" y="195" font-family="monospace" font-size="11" fill="hsl(220, 70%, 60%)" letter-spacing="1">POSTGRESQL</text>
  <text x="55" y="218" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">leaderboard_scores</text>
  <text x="55" y="233" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">article_metadata</text>
  <text x="55" y="248" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">user_progress</text>
  <text x="55" y="268" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.2)">Structured data + relations</text>
  <!-- Connection line -->
  <line x1="240" y1="230" x2="310" y2="100" stroke="rgba(59,130,246,0.2)" stroke-width="1" stroke-dasharray="4,3" />
  <!-- Vector Search -->
  <rect x="560" y="170" width="200" height="120" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(0,212,255,0.2)" stroke-width="1" />
  <text x="575" y="195" font-family="monospace" font-size="11" fill="hsl(190, 70%, 55%)" letter-spacing="1">PGVECTOR</text>
  <text x="575" y="218" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">article_embeddings</text>
  <text x="575" y="233" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">vector(1536)</text>
  <text x="575" y="248" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">cosine_similarity()</text>
  <text x="575" y="268" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.2)">Semantic article matching</text>
  <!-- Connection line -->
  <line x1="560" y1="230" x2="490" y2="100" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="4,3" />
  <!-- Storage -->
  <rect x="40" y="320" width="200" height="100" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,215,0,0.2)" stroke-width="1" />
  <text x="55" y="345" font-family="monospace" font-size="11" fill="hsl(45, 70%, 55%)" letter-spacing="1">STORAGE</text>
  <text x="55" y="368" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">article-media/</text>
  <text x="55" y="383" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">user-uploads/</text>
  <text x="55" y="403" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.2)">CDN-backed file storage</text>
  <!-- Connection line -->
  <line x1="240" y1="370" x2="310" y2="130" stroke="rgba(255,215,0,0.15)" stroke-width="1" stroke-dasharray="4,3" />
  <!-- Migrations -->
  <rect x="560" y="320" width="200" height="100" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(168,85,247,0.2)" stroke-width="1" />
  <text x="575" y="345" font-family="monospace" font-size="11" fill="hsl(270, 60%, 60%)" letter-spacing="1">MIGRATIONS</text>
  <text x="575" y="368" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">supabase/migrations/</text>
  <text x="575" y="383" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">schema versioning</text>
  <text x="575" y="403" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.2)">Reproducible DB setup</text>
  <!-- Connection line -->
  <line x1="560" y1="370" x2="490" y2="130" stroke="rgba(168,85,247,0.15)" stroke-width="1" stroke-dasharray="4,3" />
  <!-- API Routes -->
  <rect x="280" y="170" width="240" height="90" rx="6" fill="rgba(62,207,142,0.04)" stroke="rgba(62,207,142,0.15)" stroke-width="1" />
  <text x="295" y="195" font-family="monospace" font-size="10" fill="hsl(155, 50%, 50%)" letter-spacing="1">API ROUTES</text>
  <text x="295" y="215" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.35)">/api/vector-search</text>
  <text x="295" y="230" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.35)">/api/leaderboard</text>
  <text x="295" y="245" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.35)">/api/media/[slug]</text>
  <!-- Connection from center to API -->
  <line x1="400" y1="130" x2="400" y2="170" stroke="rgba(62,207,142,0.3)" stroke-width="1.5" />
</svg>