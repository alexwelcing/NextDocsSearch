<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1025" />
      <stop offset="100%" stop-color="#1a0a20" />
    </linearGradient>
    <linearGradient id="bg3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a10" />
      <stop offset="100%" stop-color="#0a1520" />
    </linearGradient>
    <radialGradient id="splatGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="hsl(190, 60%, 40%)" stop-opacity="0.3" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  <!-- Split view: Image Sphere vs Gaussian Splat -->
  <!-- Left panel: Image Sphere -->
  <rect x="30" y="40" width="360" height="370" rx="6" fill="url(#bg3a)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="50" y="70" font-family="monospace" font-size="11" fill="hsl(190, 70%, 55%)" letter-spacing="1">IMAGE SPHERE MODE</text>
  <!-- Sphere wireframe -->
  <g transform="translate(210, 220)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="hsl(270, 50%, 50%)" stroke-width="0.5" />
    <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="hsl(270, 50%, 50%)" stroke-width="0.5" />
    <ellipse cx="0" cy="0" rx="40" ry="120" fill="none" stroke="hsl(270, 50%, 50%)" stroke-width="0.5" />
    <ellipse cx="0" cy="0" rx="80" ry="120" fill="none" stroke="hsl(270, 50%, 50%)" stroke-width="0.5" />
    <ellipse cx="0" cy="0" rx="120" ry="80" fill="none" stroke="hsl(270, 50%, 50%)" stroke-width="0.5" />
  </g>
  <!-- Crossfade arrow -->
  <g transform="translate(130, 340)">
    <rect x="0" y="0" width="160" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.25)" stroke-width="0.5" />
    <text x="10" y="16" font-family="monospace" font-size="9" fill="hsl(190, 60%, 55%)">CROSSFADE: 1.2s</text>
  </g>
  <!-- Right panel: Gaussian Splat -->
  <rect x="410" y="40" width="360" height="370" rx="6" fill="url(#bg3b)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="430" y="70" font-family="monospace" font-size="11" fill="hsl(45, 70%, 55%)" letter-spacing="1">GAUSSIAN SPLAT MODE</text>
  <!-- Splat particles -->
  <g filter="url(#blur3)" opacity="0.5">
    <circle cx="550" cy="180" r="30" fill="hsl(120, 40%, 35%)" />
    <circle cx="600" cy="200" r="25" fill="hsl(150, 40%, 30%)" />
    <circle cx="520" cy="220" r="35" fill="hsl(100, 35%, 25%)" />
    <circle cx="630" cy="170" r="20" fill="hsl(180, 40%, 30%)" />
    <circle cx="570" cy="250" r="28" fill="hsl(140, 35%, 28%)" />
    <circle cx="650" cy="240" r="22" fill="hsl(160, 40%, 25%)" />
    <circle cx="500" cy="270" r="18" fill="hsl(110, 30%, 30%)" />
    <circle cx="690" cy="200" r="15" fill="hsl(170, 35%, 28%)" />
  </g>
  <!-- Volumetric label -->
  <g transform="translate(510, 340)">
    <rect x="0" y="0" width="160" height="24" rx="4" fill="rgba(255,215,0,0.1)" stroke="rgba(255,215,0,0.25)" stroke-width="0.5" />
    <text x="10" y="16" font-family="monospace" font-size="9" fill="hsl(45, 70%, 55%)">VOLUMETRIC 3D</text>
  </g>
  <!-- VS divider -->
  <line x1="400" y1="60" x2="400" y2="390" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4" />
  <rect x="384" y="210" width="32" height="20" rx="4" fill="#0a0a1a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <text x="391" y="224" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">VS</text>
  <!-- Title -->
  <text x="30" y="30" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">DYNAMIC BACKGROUND SYSTEMS</text>
</svg>