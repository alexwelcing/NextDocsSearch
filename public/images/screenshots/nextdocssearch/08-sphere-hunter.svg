<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gameBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080815" />
      <stop offset="100%" stop-color="#030308" />
    </linearGradient>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <radialGradient id="orbFill" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="hsl(190, 90%, 70%)" />
      <stop offset="100%" stop-color="hsl(190, 80%, 35%)" />
    </radialGradient>
    <radialGradient id="orbFill2" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="hsl(45, 90%, 70%)" />
      <stop offset="100%" stop-color="hsl(45, 80%, 35%)" />
    </radialGradient>
    <radialGradient id="orbFill3" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="hsl(270, 90%, 70%)" />
      <stop offset="100%" stop-color="hsl(270, 80%, 35%)" />
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gameBg)" />
  <!-- HUD overlay -->
  <!-- Score -->
  <rect x="30" y="20" width="160" height="45" rx="0" fill="rgba(0,0,0,0.6)" stroke="rgba(0,212,255,0.3)" stroke-width="1" />
  <text x="42" y="38" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">SCORE</text>
  <text x="42" y="56" font-family="monospace" font-size="20" fill="hsl(190, 80%, 55%)" font-weight="700">2,450</text>
  <!-- Timer -->
  <rect x="610" y="20" width="160" height="45" rx="0" fill="rgba(0,0,0,0.6)" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
  <text x="622" y="38" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">TIME</text>
  <text x="622" y="56" font-family="monospace" font-size="20" fill="hsl(45, 80%, 55%)" font-weight="700">00:42</text>
  <!-- Combo indicator -->
  <rect x="320" y="20" width="160" height="45" rx="0" fill="rgba(0,0,0,0.6)" stroke="rgba(168,85,247,0.3)" stroke-width="1" />
  <text x="332" y="38" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">COMBO</text>
  <text x="332" y="56" font-family="monospace" font-size="20" fill="hsl(270, 70%, 60%)" font-weight="700">x3</text>
  <!-- Floating orbs in 3D space -->
  <g filter="url(#orbGlow)">
    <circle cx="200" cy="200" r="25" fill="url(#orbFill)" opacity="0.9" />
    <circle cx="500" cy="160" r="20" fill="url(#orbFill2)" opacity="0.85" />
    <circle cx="350" cy="300" r="22" fill="url(#orbFill3)" opacity="0.8" />
    <circle cx="600" cy="280" r="18" fill="url(#orbFill)" opacity="0.75" />
    <circle cx="150" cy="330" r="15" fill="url(#orbFill2)" opacity="0.7" />
    <circle cx="680" cy="180" r="20" fill="url(#orbFill3)" opacity="0.85" />
  </g>
  <!-- Click indicator -->
  <g transform="translate(500, 160)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="hsl(45, 80%, 55%)" stroke-width="1" opacity="0.5" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="hsl(45, 80%, 55%)" stroke-width="0.5" opacity="0.3" />
    <text x="25" y="-15" font-family="monospace" font-size="12" fill="hsl(45, 80%, 55%)" font-weight="700">+100</text>
  </g>
  <!-- Cursor -->
  <g transform="translate(495, 155)">
    <polygon points="0,0 0,16 4,12 8,20 12,18 8,10 14,10" fill="white" opacity="0.8" />
  </g>
  <!-- Game state flow at bottom -->
  <rect x="40" y="380" width="720" height="50" rx="6" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="60" height="18" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />
    <text x="10" y="13" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">IDLE</text>
  </g>
  <text x="130" y="413" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">-&gt;</text>
  <g transform="translate(145, 400)">
    <rect x="0" y="0" width="70" height="18" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />
    <text x="8" y="13" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">START</text>
  </g>
  <text x="225" y="413" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">-&gt;</text>
  <g transform="translate(240, 400)">
    <rect x="0" y="0" width="90" height="18" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />
    <text x="8" y="13" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">COUNTDOWN</text>
  </g>
  <text x="340" y="413" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">-&gt;</text>
  <g transform="translate(355, 400)">
    <rect x="0" y="0" width="60" height="18" rx="2" fill="rgba(0,212,255,0.15)" stroke="hsl(190, 60%, 40%)" stroke-width="1" />
    <text x="10" y="13" font-family="monospace" font-size="7" fill="hsl(190, 70%, 55%)">PLAY</text>
  </g>
  <text x="425" y="413" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">-&gt;</text>
  <g transform="translate(440, 400)">
    <rect x="0" y="0" width="90" height="18" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />
    <text x="8" y="13" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">GAME OVER</text>
  </g>
  <text x="540" y="413" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">-&gt;</text>
  <g transform="translate(555, 400)">
    <rect x="0" y="0" width="100" height="18" rx="2" fill="rgba(255,215,0,0.1)" stroke="rgba(255,215,0,0.2)" stroke-width="0.5" />
    <text x="8" y="13" font-family="monospace" font-size="7" fill="hsl(45, 60%, 50%)">LEADERBOARD</text>
  </g>
  <!-- Title -->
  <text x="40" y="95" font-family="monospace" font-size="12" fill="white" letter-spacing="1">SPHERE HUNTER</text>
  <text x="40" y="112" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">Timed orb-clicking with combos and scoring</text>
</svg>