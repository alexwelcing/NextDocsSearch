<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winterBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#05080f" />
    </linearGradient>
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#winterBg)" />
  <!-- Season panels -->
  <!-- Winter -->
  <rect x="30" y="60" width="170" height="240" rx="6" fill="rgba(100,150,255,0.06)" stroke="rgba(100,150,255,0.2)" stroke-width="1" />
  <text x="70" y="90" font-family="monospace" font-size="11" fill="hsl(220, 70%, 65%)" letter-spacing="1">WINTER</text>
  <!-- Snowflakes -->
  <g fill="white" opacity="0.8">
    <text x="60" y="130" font-size="16" opacity="0.9">*</text>
    <text x="100" y="155" font-size="12" opacity="0.7">*</text>
    <text x="140" y="120" font-size="14" opacity="0.8">*</text>
    <text x="80" y="180" font-size="10" opacity="0.6">*</text>
    <text x="130" y="200" font-size="16" opacity="0.9">*</text>
    <text x="55" y="220" font-size="12" opacity="0.5">*</text>
    <text x="160" y="170" font-size="8" opacity="0.7">*</text>
    <text x="90" y="250" font-size="14" opacity="0.6">*</text>
    <text x="150" y="240" font-size="10" opacity="0.8">*</text>
    <text x="70" y="270" font-size="12" opacity="0.5">*</text>
  </g>
  <!-- Spring -->
  <rect x="220" y="60" width="170" height="240" rx="6" fill="rgba(255,150,200,0.06)" stroke="rgba(255,150,200,0.2)" stroke-width="1" />
  <text x="262" y="90" font-family="monospace" font-size="11" fill="hsl(330, 70%, 65%)" letter-spacing="1">SPRING</text>
  <!-- Petals -->
  <g opacity="0.7">
    <ellipse cx="270" cy="140" rx="8" ry="4" fill="hsl(330, 60%, 65%)" transform="rotate(30,270,140)" opacity="0.8" />
    <ellipse cx="310" cy="170" rx="6" ry="3" fill="hsl(340, 60%, 70%)" transform="rotate(-20,310,170)" opacity="0.7" />
    <ellipse cx="350" cy="130" rx="7" ry="3.5" fill="hsl(320, 55%, 60%)" transform="rotate(45,350,130)" opacity="0.9" />
    <ellipse cx="280" cy="200" rx="6" ry="3" fill="hsl(335, 60%, 65%)" transform="rotate(-40,280,200)" opacity="0.6" />
    <ellipse cx="340" cy="220" rx="8" ry="4" fill="hsl(325, 55%, 70%)" transform="rotate(15,340,220)" opacity="0.8" />
    <ellipse cx="260" cy="250" rx="5" ry="2.5" fill="hsl(340, 60%, 65%)" transform="rotate(60,260,250)" opacity="0.7" />
    <ellipse cx="330" cy="260" rx="7" ry="3.5" fill="hsl(330, 55%, 60%)" transform="rotate(-30,330,260)" opacity="0.5" />
  </g>
  <!-- Summer -->
  <rect x="410" y="60" width="170" height="240" rx="6" fill="rgba(255,200,50,0.06)" stroke="rgba(255,200,50,0.2)" stroke-width="1" />
  <text x="448" y="90" font-family="monospace" font-size="11" fill="hsl(50, 80%, 55%)" letter-spacing="1">SUMMER</text>
  <!-- Fireflies -->
  <g filter="url(#particleGlow)">
    <circle cx="460" cy="140" r="3" fill="hsl(50, 90%, 60%)" opacity="0.9" />
    <circle cx="510" cy="170" r="2.5" fill="hsl(55, 85%, 55%)" opacity="0.7" />
    <circle cx="540" cy="130" r="2" fill="hsl(45, 90%, 60%)" opacity="0.8" />
    <circle cx="470" cy="200" r="3" fill="hsl(50, 85%, 55%)" opacity="0.6" />
    <circle cx="530" cy="220" r="2.5" fill="hsl(55, 90%, 60%)" opacity="0.9" />
    <circle cx="450" cy="250" r="2" fill="hsl(50, 85%, 55%)" opacity="0.7" />
    <circle cx="520" cy="260" r="3" fill="hsl(45, 90%, 60%)" opacity="0.5" />
  </g>
  <!-- Autumn -->
  <rect x="600" y="60" width="170" height="240" rx="6" fill="rgba(200,100,30,0.06)" stroke="rgba(200,100,30,0.2)" stroke-width="1" />
  <text x="638" y="90" font-family="monospace" font-size="11" fill="hsl(25, 70%, 55%)" letter-spacing="1">AUTUMN</text>
  <!-- Leaves -->
  <g opacity="0.7">
    <ellipse cx="650" cy="140" rx="10" ry="5" fill="hsl(30, 70%, 45%)" transform="rotate(25,650,140)" />
    <ellipse cx="710" cy="160" rx="8" ry="4" fill="hsl(15, 65%, 40%)" transform="rotate(-35,710,160)" />
    <ellipse cx="670" cy="190" rx="9" ry="4.5" fill="hsl(40, 60%, 42%)" transform="rotate(50,670,190)" />
    <ellipse cx="730" cy="210" rx="7" ry="3.5" fill="hsl(20, 70%, 38%)" transform="rotate(-15,730,210)" />
    <ellipse cx="640" cy="240" rx="10" ry="5" fill="hsl(35, 65%, 40%)" transform="rotate(40,640,240)" />
    <ellipse cx="700" cy="260" rx="8" ry="4" fill="hsl(25, 60%, 42%)" transform="rotate(-45,700,260)" />
  </g>
  <!-- Performance indicator -->
  <rect x="30" y="340" width="740" height="70" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="50" y="365" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">PERFORMANCE AWARENESS</text>
  <rect x="50" y="380" width="200" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
  <rect x="50" y="380" width="160" height="8" rx="4" fill="hsl(120, 60%, 40%)" opacity="0.6" />
  <text x="260" y="388" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">Effects auto-scale to device capability</text>
  <!-- Title -->
  <text x="30" y="40" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">SEASONAL EFFECTS ENGINE</text>
</svg>