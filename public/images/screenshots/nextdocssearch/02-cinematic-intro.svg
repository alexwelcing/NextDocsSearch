<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="introBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03030a" />
      <stop offset="100%" stop-color="#0a0a20" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#introBg)" />
  <!-- Camera path visualization -->
  <path d="M 100,350 C 200,300 250,200 350,180 S 500,250 550,150 S 650,100 700,120" stroke="hsl(190, 70%, 50%)" stroke-width="2" fill="none" stroke-dasharray="8,4" opacity="0.5" />
  <!-- Camera waypoints -->
  <circle cx="100" cy="350" r="6" fill="hsl(190, 80%, 50%)" opacity="0.8" filter="url(#glow2)" />
  <circle cx="350" cy="180" r="6" fill="hsl(190, 80%, 50%)" opacity="0.8" filter="url(#glow2)" />
  <circle cx="550" cy="150" r="6" fill="hsl(190, 80%, 50%)" opacity="0.8" filter="url(#glow2)" />
  <circle cx="700" cy="120" r="6" fill="hsl(45, 80%, 55%)" opacity="0.8" filter="url(#glow2)" />
  <!-- Camera icon at start -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="24" height="16" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.7" />
    <circle cx="12" cy="8" r="4" fill="none" stroke="white" stroke-width="1" opacity="0.7" />
    <polygon points="24,4 32,0 32,16 24,12" fill="none" stroke="white" stroke-width="1" opacity="0.5" />
  </g>
  <!-- Camera FOV cone -->
  <g opacity="0.1">
    <polygon points="100,350 300,250 300,350" fill="hsl(190, 60%, 50%)" />
  </g>
  <!-- Timeline bar at bottom -->
  <rect x="60" y="390" width="680" height="3" fill="rgba(255,255,255,0.1)" rx="1.5" />
  <rect x="60" y="390" width="200" height="3" fill="hsl(190, 80%, 50%)" rx="1.5" />
  <circle cx="260" cy="391" r="6" fill="hsl(190, 80%, 50%)" stroke="#030308" stroke-width="2" />
  <!-- Phase labels -->
  <text x="100" y="425" font-family="monospace" font-size="10" fill="hsl(190, 70%, 55%)" letter-spacing="1">INTRO</text>
  <text x="300" y="425" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="1">TRANSITION</text>
  <text x="550" y="425" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="1">INTERACTIVE</text>
  <!-- Waypoint labels -->
  <text x="80" y="370" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">START</text>
  <text x="330" y="170" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">ORBIT</text>
  <text x="530" y="140" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">PAN</text>
  <text x="680" y="110" font-family="monospace" font-size="8" fill="hsl(45, 70%, 55%)">FREE LOOK</text>
  <!-- Speed indicators -->
  <g transform="translate(350, 180)" opacity="0.4">
    <line x1="0" y1="0" x2="20" y2="-5" stroke="white" stroke-width="1" />
    <polygon points="20,-5 16,-8 17,-3" fill="white" />
  </g>
  <g transform="translate(550, 150)" opacity="0.4">
    <line x1="0" y1="0" x2="20" y2="-5" stroke="white" stroke-width="1" />
    <polygon points="20,-5 16,-8 17,-3" fill="white" />
  </g>
  <!-- Title -->
  <text x="60" y="50" font-family="monospace" font-size="14" fill="hsl(190, 70%, 55%)" letter-spacing="2" font-weight="600">CINEMATIC CAMERA CHOREOGRAPHY</text>
  <text x="60" y="72" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.35)">Intro flow transitions to interactive orbit controls</text>
</svg>