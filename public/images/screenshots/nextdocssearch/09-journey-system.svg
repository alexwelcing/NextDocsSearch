<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="journeyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a18" />
      <stop offset="100%" stop-color="#050510" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#journeyBg)" />
  <text x="40" y="35" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">JOURNEY SYSTEM: QUESTS + ACHIEVEMENTS</text>
  <!-- Quest progress panel -->
  <rect x="40" y="60" width="350" height="350" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="55" y="90" font-family="monospace" font-size="11" fill="hsl(190, 70%, 55%)" letter-spacing="1">ACTIVE QUESTS</text>
  <!-- Quest 1: Completed -->
  <rect x="55" y="105" width="320" height="55" rx="4" fill="rgba(120,255,120,0.04)" stroke="rgba(120,255,120,0.15)" stroke-width="0.5" />
  <text x="70" y="125" font-family="monospace" font-size="10" fill="hsl(120, 60%, 55%)">Ask Your First Question</text>
  <rect x="70" y="135" width="280" height="6" rx="3" fill="rgba(255,255,255,0.06)" />
  <rect x="70" y="135" width="280" height="6" rx="3" fill="hsl(120, 60%, 45%)" opacity="0.7" />
  <text x="305" y="155" font-family="monospace" font-size="7" fill="hsl(120, 50%, 50%)">COMPLETE</text>
  <!-- Quest 2: In progress -->
  <rect x="55" y="170" width="320" height="55" rx="4" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.15)" stroke-width="0.5" />
  <text x="70" y="190" font-family="monospace" font-size="10" fill="hsl(190, 60%, 55%)">Read 5 Articles</text>
  <rect x="70" y="200" width="280" height="6" rx="3" fill="rgba(255,255,255,0.06)" />
  <rect x="70" y="200" width="168" height="6" rx="3" fill="hsl(190, 70%, 45%)" opacity="0.7" />
  <text x="305" y="220" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">3 / 5</text>
  <!-- Quest 3: In progress -->
  <rect x="55" y="235" width="320" height="55" rx="4" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="0.5" />
  <text x="70" y="255" font-family="monospace" font-size="10" fill="hsl(190, 50%, 50%)">Play Sphere Hunter</text>
  <rect x="70" y="265" width="280" height="6" rx="3" fill="rgba(255,255,255,0.06)" />
  <rect x="70" y="265" width="0" height="6" rx="3" fill="hsl(190, 70%, 45%)" opacity="0.7" />
  <text x="305" y="285" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)">0 / 1</text>
  <!-- Quest 4: Locked -->
  <rect x="55" y="300" width="320" height="55" rx="4" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5" />
  <text x="70" y="320" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)">Score 1000+ in Sphere Hunter</text>
  <rect x="70" y="330" width="280" height="6" rx="3" fill="rgba(255,255,255,0.04)" />
  <text x="305" y="350" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.15)">LOCKED</text>
  <!-- Achievements panel -->
  <rect x="410" y="60" width="350" height="200" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="425" y="90" font-family="monospace" font-size="11" fill="hsl(45, 70%, 55%)" letter-spacing="1">ACHIEVEMENTS</text>
  <!-- Achievement badges -->
  <g transform="translate(430, 105)">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.25)" stroke-width="1" />
    <text x="18" y="35" font-size="24" fill="hsl(45, 80%, 55%)">?</text>
    <text x="8" y="60" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.3)">Explorer</text>
  </g>
  <g transform="translate(510, 105)">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="rgba(120,255,120,0.08)" stroke="rgba(120,255,120,0.25)" stroke-width="1" />
    <text x="18" y="35" font-size="24" fill="hsl(120, 60%, 50%)">*</text>
    <text x="8" y="60" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.3)">Curious</text>
  </g>
  <g transform="translate(590, 105)">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />
    <text x="18" y="35" font-size="24" fill="rgba(255,255,255,0.15)">?</text>
    <text x="8" y="60" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.15)">Scholar</text>
  </g>
  <g transform="translate(670, 105)">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />
    <text x="18" y="35" font-size="24" fill="rgba(255,255,255,0.15)">?</text>
    <text x="8" y="60" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.15)">Champion</text>
  </g>
  <!-- Unlock notification -->
  <g transform="translate(410, 195)">
    <rect x="0" y="0" width="350" height="55" rx="4" fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.2)" stroke-width="1" />
    <text x="15" y="20" font-family="monospace" font-size="9" fill="hsl(45, 70%, 55%)" letter-spacing="1">UNLOCKED!</text>
    <text x="15" y="38" font-family="monospace" font-size="10" fill="white">"Curious Mind" - Asked first AI question</text>
  </g>
  <!-- LocalStorage persistence -->
  <rect x="410" y="280" width="350" height="130" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="425" y="305" font-family="monospace" font-size="10" fill="hsl(190, 60%, 55%)" letter-spacing="1">PERSISTENCE</text>
  <text x="425" y="330" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)">localStorage.setItem(</text>
  <text x="435" y="345" font-family="monospace" font-size="9" fill="hsl(190, 50%, 50%)">'journey-state',</text>
  <text x="435" y="360" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">{`{ quests, achievements, progress }`}</text>
  <text x="425" y="378" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)">)</text>
  <text x="425" y="400" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">Progress survives page reloads</text>
</svg>