<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="searchBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08081a" />
      <stop offset="100%" stop-color="#030310" />
    </linearGradient>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#searchBg)" />
  <!-- Embedding space visualization -->
  <text x="40" y="35" font-family="monospace" font-size="14" fill="white" letter-spacing="1" font-weight="600">AI-POWERED SEMANTIC SEARCH</text>
  <text x="40" y="55" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">OpenAI embeddings + Supabase vector search</text>
  <!-- Vector space -->
  <rect x="40" y="70" width="400" height="340" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="55" y="95" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="1">EMBEDDING SPACE</text>
  <!-- Axes -->
  <line x1="60" y1="370" x2="420" y2="370" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <line x1="60" y1="370" x2="60" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <!-- Article clusters -->
  <!-- Cluster 1: AI Strategy -->
  <g filter="url(#dotGlow)">
    <circle cx="180" cy="200" r="5" fill="hsl(190, 80%, 55%)" opacity="0.8" />
    <circle cx="200" cy="180" r="4" fill="hsl(190, 70%, 50%)" opacity="0.7" />
    <circle cx="160" cy="210" r="4" fill="hsl(190, 75%, 52%)" opacity="0.6" />
    <circle cx="190" cy="220" r="3.5" fill="hsl(190, 65%, 48%)" opacity="0.7" />
  </g>
  <text x="150" y="245" font-family="monospace" font-size="7" fill="hsl(190, 60%, 50%)" opacity="0.6">AI Strategy</text>
  <!-- Cluster 2: Technical -->
  <g filter="url(#dotGlow)">
    <circle cx="320" cy="150" r="5" fill="hsl(270, 70%, 55%)" opacity="0.8" />
    <circle cx="340" cy="170" r="4" fill="hsl(270, 60%, 50%)" opacity="0.7" />
    <circle cx="310" cy="140" r="3.5" fill="hsl(270, 65%, 52%)" opacity="0.6" />
    <circle cx="350" cy="155" r="4" fill="hsl(270, 55%, 48%)" opacity="0.7" />
  </g>
  <text x="305" y="190" font-family="monospace" font-size="7" fill="hsl(270, 50%, 55%)" opacity="0.6">Technical</text>
  <!-- Cluster 3: Fiction -->
  <g filter="url(#dotGlow)">
    <circle cx="250" cy="310" r="5" fill="hsl(45, 80%, 55%)" opacity="0.8" />
    <circle cx="270" cy="330" r="4" fill="hsl(45, 70%, 50%)" opacity="0.7" />
    <circle cx="230" cy="320" r="3.5" fill="hsl(45, 75%, 52%)" opacity="0.6" />
    <circle cx="260" cy="340" r="4" fill="hsl(45, 65%, 48%)" opacity="0.5" />
  </g>
  <text x="225" y="360" font-family="monospace" font-size="7" fill="hsl(45, 60%, 50%)" opacity="0.6">Fiction</text>
  <!-- Query point -->
  <circle cx="220" cy="200" r="8" fill="none" stroke="hsl(0, 80%, 55%)" stroke-width="2" opacity="0.8" filter="url(#dotGlow)" />
  <text x="232" y="195" font-family="monospace" font-size="8" fill="hsl(0, 70%, 60%)">QUERY</text>
  <!-- Similarity lines -->
  <line x1="220" y1="200" x2="180" y2="200" stroke="hsl(120, 60%, 50%)" stroke-width="1" stroke-dasharray="3,2" opacity="0.5" />
  <line x1="220" y1="200" x2="200" y2="180" stroke="hsl(120, 60%, 50%)" stroke-width="1" stroke-dasharray="3,2" opacity="0.4" />
  <line x1="220" y1="200" x2="320" y2="150" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,2" opacity="0.3" />
  <!-- Search interface panel -->
  <rect x="470" y="70" width="300" height="340" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <!-- Search bar -->
  <rect x="490" y="90" width="260" height="36" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(0,212,255,0.3)" stroke-width="1" />
  <text x="500" y="113" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">How does AI affect product?</text>
  <text x="720" y="113" font-family="monospace" font-size="11" fill="hsl(190, 80%, 55%)">-&gt;</text>
  <!-- Results -->
  <text x="490" y="155" font-family="monospace" font-size="9" fill="hsl(190, 60%, 55%)" letter-spacing="1">SEMANTIC RESULTS</text>
  <!-- Result 1 -->
  <rect x="490" y="168" width="260" height="50" rx="4" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="0.5" />
  <text x="502" y="186" font-family="monospace" font-size="10" fill="white">AI Product Strategy Roadmap</text>
  <rect x="502" y="192" width="40" height="14" rx="2" fill="rgba(120,255,120,0.15)" />
  <text x="508" y="203" font-family="monospace" font-size="8" fill="hsl(120, 60%, 55%)">0.94</text>
  <text x="550" y="203" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">cosine similarity</text>
  <!-- Result 2 -->
  <rect x="490" y="226" width="260" height="50" rx="4" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="0.5" />
  <text x="502" y="244" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.8)">Trust Calibration in AI UX</text>
  <rect x="502" y="250" width="40" height="14" rx="2" fill="rgba(120,255,120,0.1)" />
  <text x="508" y="261" font-family="monospace" font-size="8" fill="hsl(120, 50%, 50%)">0.87</text>
  <text x="550" y="261" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">cosine similarity</text>
  <!-- Result 3 -->
  <rect x="490" y="284" width="260" height="50" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />
  <text x="502" y="302" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.6)">Safe LLM Launch Runbook</text>
  <rect x="502" y="308" width="40" height="14" rx="2" fill="rgba(120,255,120,0.08)" />
  <text x="508" y="319" font-family="monospace" font-size="8" fill="hsl(120, 40%, 45%)">0.79</text>
  <text x="550" y="319" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">cosine similarity</text>
  <!-- Pipeline label -->
  <text x="490" y="370" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.25)">query -&gt; embed -&gt; pgvector -&gt; rank -&gt; display</text>
</svg>