<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(220, 60%, 8%)" />
      <stop offset="100%" stop-color="hsl(200, 50%, 12%)" />
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="hsl(190, 80%, 50%)" stop-opacity="0.25" />
      <stop offset="100%" stop-color="hsl(190, 80%, 50%)" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="hsl(45, 80%, 55%)" stop-opacity="0.15" />
      <stop offset="100%" stop-color="hsl(45, 80%, 55%)" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#glow)" />
  <rect width="100%" height="100%" fill="url(#glow2)" />
  <g filter="url(#blur)">
    <circle cx="350" cy="300" r="200" fill="hsl(190, 70%, 45%)" opacity="0.12" />
    <circle cx="900" cy="400" r="250" fill="hsl(45, 70%, 50%)" opacity="0.08" />
    <circle cx="150" cy="500" r="180" fill="hsl(270, 50%, 40%)" opacity="0.06" />
    <circle cx="1050" cy="150" r="160" fill="hsl(190, 60%, 40%)" opacity="0.10" />
  </g>
  <!-- Grid pattern -->
