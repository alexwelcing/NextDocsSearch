    <circle cx="280" cy="220" r="3" fill="hsl(190, 70%, 55%)" />
    <circle cx="280" cy="340" r="3" fill="hsl(45, 70%, 55%)" />
  </g>
  <!-- Title text -->
  <text x="320" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1" filter="url(#textShadow)">NextDocsSearch</text>
  <text x="320" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="hsl(190, 70%, 65%)" letter-spacing="-0.5">Complete Feature Guide</text>
  <!-- Subtitle -->
  <text x="320" y="370" font-family="'Courier New', monospace" font-size="16" fill="rgba(255,255,255,0.5)" letter-spacing="2" text-transform="uppercase">3D SCENE  //  AI SEARCH  //  GAMIFICATION  //  SUPABASE</text>
