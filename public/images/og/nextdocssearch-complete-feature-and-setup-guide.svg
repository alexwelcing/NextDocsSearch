  <!-- 3D cube icon -->
  <g transform="translate(80, 180)">
    <polygon points="50,0 100,28 100,84 50,112 0,84 0,28" fill="none" stroke="hsl(190, 80%, 50%)" stroke-width="2" opacity="0.6" />
    <line x1="50" y1="0" x2="50" y2="56" stroke="hsl(190, 80%, 50%)" stroke-width="2" opacity="0.4" />
    <line x1="0" y1="28" x2="50" y2="56" stroke="hsl(190, 80%, 50%)" stroke-width="2" opacity="0.4" />
    <line x1="100" y1="28" x2="50" y2="56" stroke="hsl(190, 80%, 50%)" stroke-width="2" opacity="0.4" />
  </g>
